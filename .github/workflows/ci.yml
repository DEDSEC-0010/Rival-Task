name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker:
    name: Docker compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for backend /health
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8000/health > /dev/null; then
              echo "backend healthy after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "backend did not become healthy in 120s"
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/login || true)
            if [ "$code" = "200" ]; then
              echo "frontend serves /login after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "frontend did not respond in 120s"
          exit 1

      - name: End-to-end auth + task flow
        run: |
          set -euo pipefail
          # Signup sets the auth cookie.
          curl -fsS -X POST http://localhost:8000/api/v1/auth/signup \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci@example.com","password":"supersecret"}' \
            -c /tmp/cookies.txt > /dev/null
          # Create a task using the cookie.
          curl -fsS -X POST http://localhost:8000/api/v1/tasks \
            -H 'Content-Type: application/json' \
            -b /tmp/cookies.txt \
            -d '{"title":"CI smoke task","priority":"medium"}' > /dev/null
          # List tasks and assert the new one is there.
          curl -fsS -b /tmp/cookies.txt http://localhost:8000/api/v1/tasks \
            | grep -q '"CI smoke task"'
          echo "round-trip OK"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
